name: Package Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            package_script: package:linux
            artifact_glob: build/desktop/**/*.deb
          - os: windows-latest
            label: Windows
            package_script: package:win
            artifact_glob: build/desktop/**/*.exe
          - os: macos-latest
            label: macOS
            package_script: package:mac
            artifact_glob: build/desktop/**/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install electron-builder
        run: npm install -D electron-builder

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg pandoc texlive-luatex texlive-latex-recommended texlive-fonts-recommended

      - name: Build installer
        shell: bash
        run: npm run ${{ matrix.package_script }}

      - name: Smoke Linux package
        if: runner.os == 'Linux'
        run: npm run smoke:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doku-${{ matrix.label }}-artifacts
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
